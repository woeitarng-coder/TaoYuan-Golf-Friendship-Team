<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>桃園好友隊</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="桃園好友隊">
    <meta name="mobile-web-app-capable" content="yes">
    
    <meta property="og:title" content="⛳️ 桃園好友隊記分系統">
    <meta property="og:description" content="專屬高爾夫即時記分卡，內建氣象雷達與個人專注輸入模式。">
    <meta property="og:image" content="https://woeitarng-coder.github.io/TaoYuan-Golf-Friendship-Team/icon.png?v=2">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://woeitarng-coder.github.io/TaoYuan-Golf-Friendship-Team/">

    <link rel="apple-touch-icon" href="https://woeitarng-coder.github.io/TaoYuan-Golf-Friendship-Team/icon.png?v=2">
    <link rel="manifest" href="manifest.json?v=2">
    <link rel="icon" href="https://woeitarng-coder.github.io/TaoYuan-Golf-Friendship-Team/icon.png?v=2" type="image/png">
    
    <style>
        html, body {
            margin: 0; 
            padding: 0; 
            background-color: #121212; /* 讓動態島兩側背景色跟介面一致 */
            overflow: hidden; 
            width: 100%;
            height: 100vh;
            height: 100dvh;
        }

        /* --- 載入畫面的專屬設計 --- */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.6s ease-out;
        }

        .splash-icon {
            width: 120px;
            height: 120px;
            border-radius: 25px; 
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        #splash-greeting {
            color: #ffffff;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 30px;
            text-align: center;
            padding: 0 20px;
            letter-spacing: 1px;
        }

        /* 旋轉讀取動畫 */
        .loader {
            border: 4px solid #333;
            border-top: 4px solid #2E7D32; 
            border-radius: 50%;
            width: 35px;
            height: 35px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* --- 載入畫面設計結束 --- */

        .iframe-container {
            /* ⛳️ 利用 iOS 專屬變數，把 iframe 避開頂部動態島與底部橫條 */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
            box-sizing: border-box;
            width: 100%;
            height: 100%;
        }

        iframe {
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="https://woeitarng-coder.github.io/TaoYuan-Golf-Friendship-Team/icon.png?v=2" alt="App Icon" class="splash-icon">
        <div id="splash-greeting">準備中...</div>
        <div class="loader"></div>
    </div>

    <div class="iframe-container">
        <iframe id="gas-iframe" src="https://script.google.com/macros/s/AKfycbyT6cAYWgpdX7x09QOpqPn1hNOQeBIc0RrKzNrh8hq7_jqTQ-tTvAp2x-lafKwM25Yg/exec"></iframe>
    </div>

    <script>
        // 隨機激勵語錄
        const greetings = [
            "今天天氣真好，準備抓鳥囉！ ⛳",
            "穩住節奏，每一桿都很關鍵！ 💪",
            "放輕鬆，享受高爾夫的樂趣！ 😎",
            "球道中央見！ 🏌️‍♂️",
            "這洞推進，直接清盤！ 💰",
            "專注當下，打出漂亮的一擊！ ✨",
            "今天手感火燙，準備破紀錄！ 🔥"
        ];

        window.addEventListener('DOMContentLoaded', () => {
            const greetingElement = document.getElementById('splash-greeting');
            const randomIndex = Math.floor(Math.random() * greetings.length);
            greetingElement.textContent = greetings[randomIndex];

            const splashScreen = document.getElementById('splash-screen');
            const gasIframe = document.getElementById('gas-iframe');

            const hideSplash = () => {
                splashScreen.style.opacity = '0'; 
                setTimeout(() => {
                    splashScreen.style.display = 'none'; 
                }, 600);
            };

            // 最少顯示 1.5 秒
            const minDisplayTime = new Promise(resolve => setTimeout(resolve, 1500));
            
            const iframeLoaded = new Promise(resolve => {
                gasIframe.onload = resolve;
                setTimeout(resolve, 6000); 
            });

            Promise.all([minDisplayTime, iframeLoaded]).then(() => {
                hideSplash();
            });
        });

        // 桃園好友隊原有的 Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
